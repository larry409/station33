<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Netlify form detection</title>
  </head>
  <body>
    <!--
      Static form definitions so Netlify's build-time crawler can register
      forms that are otherwise rendered client-side by React. Do not delete.
      The live forms submit here via fetch(); see components/InvestorContactModal.tsx
      and app/contact/page.tsx.
    -->
    <form name="investor-relations" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>

    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="tel" name="phone" />
      <textarea name="message"></textarea>
      <input name="bot-field" />
    </form>
  </body>
</html>
